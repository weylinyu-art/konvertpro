<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f7f5f2"/>
  
  <!-- Dot grid pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#c5bdb4" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>
  
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#3d6b4f"/>
  
  <!-- Main card -->
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="white" filter="url(#shadow)"/>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="24" flood-color="#00000012"/>
    </filter>
  </defs>
  
  <!-- Green badge -->
  <rect x="120" y="130" width="220" height="36" rx="18" fill="#edf4f0"/>
  <circle cx="148" cy="148" r="6" fill="#3d6b4f"/>
  <text x="165" y="153" font-family="monospace" font-size="13" fill="#3d6b4f" letter-spacing="1">FREE · INSTANT · NO ADS</text>
  
  <!-- Main title -->
  <text x="120" y="240" font-family="Georgia, serif" font-size="72" fill="#1a1814" font-weight="400">Koverts</text>
  
  <!-- Subtitle -->
  <text x="120" y="300" font-family="Georgia, serif" font-size="36" fill="#3d6b4f" font-style="italic">Unit Converter + AI Tools</text>
  
  <!-- Description -->
  <text x="120" y="360" font-family="system-ui, sans-serif" font-size="22" fill="#9a948a">Length · Weight · Temperature · Volume · Speed · Area</text>
  <text x="120" y="395" font-family="system-ui, sans-serif" font-size="22" fill="#9a948a">Token Calculator · Model Size · API Cost · Context Window</text>
  
  <!-- Divider -->
  <rect x="120" y="430" width="960" height="1" fill="#e4e0da"/>
  
  <!-- URL -->
  <text x="120" y="470" font-family="monospace" font-size="20" fill="#9a948a">koverts.com</text>
  
  <!-- Arrow icon -->
  <text x="1040" y="470" font-family="monospace" font-size="28" fill="#3d6b4f">→</text>
  
  <!-- Category icons row -->
  <text x="120" y="510" font-size="32">📏</text>
  <text x="170" y="510" font-size="32">⚖️</text>
  <text x="220" y="510" font-size="32">🌡️</text>
  <text x="270" y="510" font-size="32">🧪</text>
  <text x="320" y="510" font-size="32">⚡</text>
  <text x="370" y="510" font-size="32">⬛</text>
  <text x="420" y="510" font-size="32">💾</text>
  <text x="470" y="510" font-size="32">⏱️</text>
  <text x="520" y="510" font-size="32">🔋</text>
  <text x="570" y="510" font-size="32">💧</text>
  <text x="620" y="510" font-size="32">📐</text>
  <text x="670" y="510" font-size="32">💡</text>
  <text x="740" y="510" font-size="32">🤖</text>
</svg>
